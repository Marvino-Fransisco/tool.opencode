services:
  dev:
    container_name: skill-pdf-dev
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    volumes:
      - .:/workspace:cached
    working_dir: /workspace
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/workspace
    command: sleep infinity

  prod:
    image: skill/pdf
    build:
      context: .
      dockerfile: Dockerfile
      target: production
